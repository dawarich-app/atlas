# Local-build compose for the Phoenix-based Atlas (v2).
#
# Builds app-phoenix/ from source, runs it alongside the OSM/POI/routing
# sidecars. The Go atlas-control sidecar is OMITTED — M2 absorbed it into
# the Phoenix app, which now talks to docker compose directly via the
# bind-mounted socket.
#
# Usage:
#
#   # First boot — build image, start app + caddy:
#   docker compose -f compose.phoenix.yml up --build -d
#
#   # With sidecars (geocoding + routing + pois + transit):
#   docker compose -f compose.phoenix.yml --profile all up --build -d
#
#   # Or pick specific sidecar profiles:
#   docker compose -f compose.phoenix.yml --profile geocoding up --build -d
#
#   # Just the Phoenix app (no sidecars) for UI smoke tests:
#   docker compose -f compose.phoenix.yml up --build app caddy
#
# First-time setup (only needed once):
#
#   echo "SECRET_KEY_BASE=$(openssl rand -hex 32)" > .env.phoenix
#   echo "ADMIN_USERNAME=admin"                  >> .env.phoenix
#   echo "ADMIN_PASSWORD=$(openssl rand -hex 16)" >> .env.phoenix
#
# Then point compose at it:
#
#   docker compose --env-file .env.phoenix -f compose.phoenix.yml up --build
#
# Visit http://localhost:8484 (via Caddy) or http://localhost:4000 (direct).

services:
  caddy:
    image: caddy:2.11.3-alpine
    container_name: atlas-caddy
    volumes:
      - ./Caddyfile.phoenix:/etc/caddy/Caddyfile:ro
      - ./data/tiles:/srv/tiles:ro
      - ./data/caddy:/data
      - ./data/caddy-config:/config
    ports:
      - "8484:80"
    depends_on: [app]
    restart: unless-stopped

  app:
    build:
      context: ./app-phoenix
      dockerfile: Dockerfile
    image: atlas-phoenix:dev
    container_name: atlas-app
    environment:
      # Phoenix runtime
      PHX_SERVER: "true"
      PHX_HOST: ${PHX_HOST:-localhost}
      PORT: "4000"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?Set SECRET_KEY_BASE in .env.phoenix — run `openssl rand -hex 32`}

      # SQLite default. Set DATABASE_URL=postgres://... + rebuild with
      # ATLAS_DB_ADAPTER=postgres for Postgres.
      DATABASE_PATH: /data/atlas.sqlite3

      # Sidecar URLs (matches Phoenix Atlas.Maps.Upstream.* defaults).
      PHOTON_URL:      http://photon:2322
      PLACEHOLDER_URL: http://placeholder:3000
      LIBPOSTAL_URL:   http://libpostal:4400
      VALHALLA_URL:    http://valhalla:8002
      OVERPASS_URL:    http://overpass:80
      OTP_URL:         http://otp:8080

      # Map UI defaults
      TILES_URL:    ${TILES_URL:-}
      TILES_THEME:  ${TILES_THEME:-atlas-light}
      DEFAULT_LAT:  ${DEFAULT_LAT:-51.1657}
      DEFAULT_LON:  ${DEFAULT_LON:-10.4515}
      DEFAULT_ZOOM: ${DEFAULT_ZOOM:-5}

      # Admin panel auth — without these /admin returns 503
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}

      # Control plane — Phoenix execs `docker compose` directly via the
      # socket bind mount below. COMPOSE_FILE points at THIS file so the
      # in-container `docker compose` commands target the same project.
      COMPOSE_FILE: /work/compose.phoenix.yml
      HOST_PROJECT_DIR: ${HOST_PROJECT_DIR:-${PWD}}
    volumes:
      # Persistent app data (SQLite, uploaded fixtures, cached tile downloads)
      - ./data/app:/data

      # Region presets (Phoenix RegionCatalog reads these)
      - ./regions:/work/regions:ro

      # Docker socket — Phoenix's Atlas.Control execs `docker compose`
      # against the host daemon to start/stop/update sidecar containers.
      - /var/run/docker.sock:/var/run/docker.sock

      # Compose file mounted read-only so `docker compose` inside the
      # container can resolve services by name.
      - ./compose.phoenix.yml:/work/compose.phoenix.yml:ro
      - .:/work:ro

      # OSM data shared with sidecars (Phoenix RegionApplier writes here
      # via osmium-tool, sidecars read it on apply).
      - ./data/osm:/work/data/osm
    # Match the host's docker group so the nobody user inside can talk
    # to /var/run/docker.sock. Override DOCKER_GID in .env.phoenix on
    # Linux (typically 999); macOS Desktop maps this transparently.
    group_add:
      - "${DOCKER_GID:-999}"
    ports:
      - "4000:4000"
    restart: unless-stopped

  # ------------------------------------------------------------------
  # Sidecars — pulled from upstream images, no local build needed
  # ------------------------------------------------------------------

  photon:
    image: rtuszik/photon-docker:2.2.0
    container_name: apo-photon
    profiles: [geocoding, all]
    environment:
      UPDATE_STRATEGY: PARALLEL
      REGION: ${COUNTRY_CODE:-de}
    volumes:
      - ./data/photon:/photon/data
    restart: unless-stopped

  whosonfirst:
    image: pelias/whosonfirst:v8.4.0
    container_name: apo-whosonfirst
    profiles: [data-setup]
    user: "${UID:-1001}:${GID:-1001}"
    environment:
      WHOSONFIRST_COUNTRY_CODE: ${WHOSONFIRST_COUNTRY_CODE:-${COUNTRY_CODE:-de}}
    volumes:
      - ./data/whosonfirst:/mnt/pelias/whosonfirst
    command: ["bash", "/code/pelias/whosonfirst/bin/download"]

  placeholder:
    image: pelias/placeholder:v5.5.0
    container_name: apo-placeholder
    profiles: [geocoding, all]
    environment:
      PORT: 3000
      PLACEHOLDER_DATA: /data
      WOF_DIR: /wof/sqlite
    volumes:
      - ./data/placeholder:/data
      - ./data/whosonfirst:/wof:ro
    restart: unless-stopped

  libpostal:
    image: pelias/libpostal-service:nodejs-20
    container_name: apo-libpostal
    profiles: [geocoding, all]
    restart: unless-stopped

  valhalla:
    image: ghcr.io/gis-ops/docker-valhalla/valhalla:3.5.1
    container_name: apo-valhalla
    profiles: [routing, all]
    environment:
      serve_tiles: "True"
      build_admins: "True"
      build_elevation: ${BUILD_ELEVATION:-False}
      use_tiles_ignore_pbf: "False"
    volumes:
      - ./data/valhalla:/custom_files
      - ./data/srtm:/custom_files/elevation_data
      - ./data/osm:/osm:ro
    restart: unless-stopped

  overpass:
    image: wiktorn/overpass-api:v0.7.62.11
    container_name: apo-overpass
    profiles: [pois, all]
    environment:
      OVERPASS_META: ${OVERPASS_META:-no}
      OVERPASS_MODE: init
      OVERPASS_PLANET_URL: file:///osm/current.osm.bz2
      OVERPASS_DIFF_URL: ${OVERPASS_DIFF_URL:-https://download.geofabrik.de/europe/germany-updates/}
      OVERPASS_RULES_LOAD: 10
      OVERPASS_COMPRESSION: lz4
    volumes:
      - ./data/overpass:/db
      - ./data/osm:/osm:ro
    restart: unless-stopped

  otp:
    image: opentripplanner/opentripplanner:2.10.0_2026-05-18T08-51
    container_name: apo-otp
    profiles: [transit, all]
    command: ["--build", "--save", "--serve"]
    environment:
      JAVA_OPTS: ${OTP_JAVA_OPTS:--Xmx4g -XX:+UseG1GC -XX:MaxGCPauseMillis=500}
    volumes:
      - ./data/otp:/var/opentripplanner
      - ./data/osm:/osm:ro
    restart: unless-stopped
