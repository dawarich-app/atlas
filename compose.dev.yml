# Development compose for Atlas — ALWAYS builds the app from local source.
#
# Unlike compose.yml (which pulls the published ghcr release image), this file
# builds app-phoenix/ locally on every `up` via `pull_policy: build`, so your
# working-tree changes are always reflected without remembering `--build`.
#
# Usage:
#
#   # App + Caddy (rebuilds the app image, then runs):
#   docker compose -f compose.dev.yml up
#
#   # Detached:
#   docker compose -f compose.dev.yml up -d
#
#   # With sidecars (geocoding + routing + pois + transit):
#   docker compose -f compose.dev.yml --profile all up
#
#   # Pick specific sidecar profiles:
#   docker compose -f compose.dev.yml --profile geocoding --profile routing up
#
# Visit http://localhost:8484 (via Caddy) or http://localhost:4000 (direct).
#
# No .env required: SECRET_KEY_BASE auto-generates on first boot (persisted to
# data/app/.secret_key_base). Set ADMIN_USERNAME/ADMIN_PASSWORD to unlock /admin.
# `pull_policy: build` forces a fresh build each `up`; for a clean rebuild that
# ignores Docker's layer cache, add `--build` with `docker compose ... build
# --no-cache app`.

services:
  caddy:
    image: caddy:2.11.3-alpine
    container_name: atlas-caddy
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/tiles:/srv/tiles:ro
      - ./data/caddy:/data
      - ./data/caddy-config:/config
    ports:
      - "8484:80"
    depends_on: [app]
    restart: unless-stopped

  app:
    build:
      context: ./app-phoenix
      dockerfile: Dockerfile
    image: atlas-app:dev
    # Always (re)build from local source on `up`, even if atlas-app:dev exists.
    pull_policy: build
    container_name: atlas-app
    environment:
      # Phoenix runtime. Migrations run automatically on boot.
      PHX_SERVER: "true"
      PHX_HOST: ${PHX_HOST:-localhost}
      PORT: "4000"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-}
      # SQLite by default. For Postgres set DATABASE_URL=postgres://... AND
      # rebuild with ATLAS_DB_ADAPTER=postgres.
      DATABASE_PATH: ${DATABASE_PATH:-/data/atlas.sqlite3}
      DATABASE_URL: ${DATABASE_URL:-}
      PHOTON_URL: http://photon:2322
      PLACEHOLDER_URL: http://placeholder:3000
      LIBPOSTAL_URL: http://libpostal:4400
      VALHALLA_URL: http://valhalla:8002
      OVERPASS_URL: http://overpass:80
      OTP_URL: http://otp:8080
      TILES_URL: ${TILES_URL:-}
      TILES_THEME: ${TILES_THEME:-atlas-light}
      DEFAULT_LAT: ${DEFAULT_LAT:-51.1657}
      DEFAULT_LON: ${DEFAULT_LON:-10.4515}
      DEFAULT_ZOOM: ${DEFAULT_ZOOM:-2}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      # Control plane — the app execs `docker compose` against the host daemon
      # via the socket below. COMPOSE_FILE points at THIS file so in-container
      # `docker compose` targets the same dev project. Region data (PBF
      # download, osmium merge, OTP staging) is processed natively under
      # /work/data.
      COMPOSE_FILE: /work/compose.dev.yml
      # Lets in-container `docker compose` resolve the file's relative bind
      # paths (./data/photon, …) against the HOST checkout — the daemon only
      # understands host paths.
      HOST_PROJECT_DIR: ${HOST_PROJECT_DIR:-${PWD}}
    volumes:
      - ./data/app:/data
      - ./regions:/work/regions:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./compose.dev.yml:/work/compose.dev.yml:ro
      - .:/work:ro
      - ./data/osm:/work/data/osm
      - ./data/gtfs:/work/data/gtfs
      - ./data/otp:/work/data/otp
      - ./data/tiles:/work/data/tiles
    # Match the docker socket's group so the `nobody` user can talk to it.
    # Linux: usually `stat -c %g /var/run/docker.sock` (often 999).
    # macOS (OrbStack / Docker Desktop): the socket maps as gid 0 — set
    # DOCKER_GID=0 in .env.
    group_add:
      - "${DOCKER_GID:-999}"
    ports:
      - "4000:4000"
    restart: unless-stopped

  photon:
    image: rtuszik/photon-docker:2.2.0
    container_name: apo-photon
    profiles: [geocoding, all]
    environment:
      UPDATE_STRATEGY: PARALLEL
      # rtuszik/photon-docker reads REGION (NOT COUNTRY_CODE). Empty/unset → planet (~56 GB compressed).
      REGION: ${COUNTRY_CODE:-de}
    volumes:
      - ./data/photon:/photon/data
    restart: unless-stopped

  whosonfirst:
    image: pelias/whosonfirst:v8.4.0
    container_name: apo-whosonfirst
    profiles: [data-setup]
    user: "${UID:-1001}:${GID:-1001}"
    environment:
      WHOSONFIRST_COUNTRY_CODE: ${WHOSONFIRST_COUNTRY_CODE:-${COUNTRY_CODE:-de}}
    volumes:
      - ./data/whosonfirst:/mnt/pelias/whosonfirst
    command: ["bash", "/code/pelias/whosonfirst/bin/download"]

  placeholder:
    image: pelias/placeholder:v5.5.0
    container_name: apo-placeholder
    profiles: [geocoding, all]
    environment:
      PORT: 3000
      PLACEHOLDER_DATA: /data
      WOF_DIR: /wof/sqlite
    volumes:
      - ./data/placeholder:/data
      - ./data/whosonfirst:/wof:ro
    restart: unless-stopped

  libpostal:
    image: pelias/libpostal-service:nodejs-20
    container_name: apo-libpostal
    profiles: [geocoding, all]
    restart: unless-stopped

  valhalla:
    image: ghcr.io/gis-ops/docker-valhalla/valhalla:3.5.1
    container_name: apo-valhalla
    profiles: [routing, all]
    environment:
      serve_tiles: "True"
      build_admins: "True"
      build_elevation: ${BUILD_ELEVATION:-False}
      use_tiles_ignore_pbf: "False"
    volumes:
      - ./data/valhalla:/custom_files
      - ./data/srtm:/custom_files/elevation_data
      - ./data/osm:/osm:ro
    restart: unless-stopped

  overpass:
    image: wiktorn/overpass-api:v0.7.62.11
    container_name: apo-overpass
    profiles: [pois, all]
    environment:
      OVERPASS_META: ${OVERPASS_META:-no}
      OVERPASS_MODE: init
      OVERPASS_PLANET_URL: file:///osm/current.osm.bz2
      OVERPASS_DIFF_URL: ${OVERPASS_DIFF_URL:-https://download.geofabrik.de/europe/germany-updates/}
      OVERPASS_RULES_LOAD: 10
      OVERPASS_COMPRESSION: lz4
    volumes:
      - ./data/overpass:/db
      - ./data/osm:/osm:ro
    restart: unless-stopped

  otp:
    image: opentripplanner/opentripplanner:2.10.0_2026-05-18T08-51
    container_name: apo-otp
    profiles: [transit, all]
    command: ["--build", "--save", "--serve"]
    environment:
      JAVA_OPTS: ${OTP_JAVA_OPTS:--Xmx4g -XX:+UseG1GC -XX:MaxGCPauseMillis=500}
    volumes:
      - ./data/otp:/var/opentripplanner
      - ./data/osm:/osm:ro
    restart: unless-stopped
