name: test-phoenix
on:
  push:
    paths:
      - "app-phoenix/**"
      - ".github/workflows/test-phoenix.yml"
  pull_request:
    paths:
      - "app-phoenix/**"
      - ".github/workflows/test-phoenix.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-phoenix
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.5"
      - uses: actions/cache@v4
        with:
          path: |
            app-phoenix/deps
            app-phoenix/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('app-phoenix/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-
      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix credo --strict
      - run: mix test
