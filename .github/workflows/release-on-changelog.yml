name: Release on changelog

on:
  push:
    branches: [main]
    paths:
      - 'CHANGELOG.md'
      - '.github/workflows/release-on-changelog.yml'
  workflow_dispatch:

concurrency:
  group: release-on-changelog
  cancel-in-progress: false

jobs:
  release:
    name: Tag & release if new version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse top version from CHANGELOG.md
        id: parse
        run: |
          set -euo pipefail

          heading="$(grep -m1 -E '^## \[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md || true)"
          if [ -z "$heading" ]; then
            echo "::error::No version heading like '## [x.y.z] - YYYY-MM-DD' found in CHANGELOG.md"
            exit 1
          fi

          version="$(echo "$heading" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)"
          tag="v${version}"
          suffix="$(echo "$heading" | sed -E 's/^## \[[0-9]+\.[0-9]+\.[0-9]+\][[:space:]]*//')"

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

          # Case-insensitive "Unreleased" anywhere in the suffix → skip cleanly.
          if echo "$suffix" | grep -qiE 'unreleased'; then
            echo "Top entry ${version} is marked Unreleased — nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Validate: any dash variant (- ‐ ‑ ‒ – — ― −) + ISO date.
          if ! echo "$suffix" | grep -qE '^[-‐‑‒–—―−][[:space:]]+[0-9]{4}-[0-9]{2}-[0-9]{2}'; then
            echo "::error::Heading for ${version} must end with '<dash> YYYY-MM-DD' or contain 'Unreleased' (got: ${heading})"
            exit 1
          fi

          # Extract this version's section body, stopping at the next ## heading
          # or the reference-link footer (e.g. '[0.1.0]: https://...').
          awk -v ver="${version}" '
            $0 ~ "^## \\[" ver "\\]"                  { capture = 1; next }
            capture && /^## \[/                       { exit }
            capture && /^\[[0-9]+\.[0-9]+\.[0-9]+\]:/ { exit }
            capture                                   { print }
          ' CHANGELOG.md > /tmp/release-body.md

          if [ ! -s /tmp/release-body.md ]; then
            echo "::error::CHANGELOG section for ${version} is empty"
            exit 1
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Parsed version: ${version} -> tag ${tag}"

      - name: Check tag existence
        if: steps.parse.outputs.skip == 'false'
        id: exists
        env:
          TAG: ${{ steps.parse.outputs.tag }}
        run: |
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists, nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.parse.outputs.skip == 'false' && steps.exists.outputs.skip == 'false'
        env:
          TAG: ${{ steps.parse.outputs.tag }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub release
        if: steps.parse.outputs.skip == 'false' && steps.exists.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.parse.outputs.tag }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG}" \
            --notes-file /tmp/release-body.md
