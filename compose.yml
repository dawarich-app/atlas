services:
  caddy:
    image: caddy:2.11.3-alpine
    container_name: atlas-caddy
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/tiles:/srv/tiles:ro
      - ./data/caddy:/data
      - ./data/caddy-config:/config
    ports:
      - "8484:80"
    depends_on: [app]
    restart: unless-stopped

  app:
    image: ${APP_IMAGE:-ghcr.io/dawarich-app/atlas/app:latest}
    pull_policy: ${APP_PULL_POLICY:-always}
    container_name: atlas-app
    environment:
      RAILS_ENV: production
      DATABASE_URL: ${DATABASE_URL:-sqlite3:/data/app.sqlite3}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?set SECRET_KEY_BASE in .env}
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_SERVE_STATIC_FILES: "true"
      SOLID_QUEUE_IN_PUMA: "1"
      PHOTON_URL: http://photon:2322
      PLACEHOLDER_URL: http://placeholder:3000
      LIBPOSTAL_URL: http://libpostal:4400
      VALHALLA_URL: http://valhalla:8002
      OVERPASS_URL: http://overpass:80
      OTP_URL: http://otp:8080
      TILES_URL: ${TILES_URL:-}
      TILES_THEME: ${TILES_THEME:-light}
      DEFAULT_LAT: ${DEFAULT_LAT:-51.1657}
      DEFAULT_LON: ${DEFAULT_LON:-10.4515}
      DEFAULT_ZOOM: ${DEFAULT_ZOOM:-2}
      CONTROL_PLANE_URL: http://atlas-control:8090
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    volumes:
      - ./data/app:/data
      - ./regions:/rails/regions:ro
    restart: unless-stopped

  atlas-control:
    image: ${ATLAS_CONTROL_IMAGE:-ghcr.io/dawarich-app/atlas/atlas-control:latest}
    pull_policy: ${ATLAS_CONTROL_PULL_POLICY:-always}
    container_name: atlas-control
    environment:
      COMPOSE_FILE:         /work/compose.yml
      HOST_PROJECT_DIR:     ${HOST_PROJECT_DIR:-${PWD}}
      DATA_DIR:             /work/data
      REGIONS_DIR:          /work/regions
      LISTEN_ADDR:          ":8090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/work:ro
      - ./data:/work/data
    restart: unless-stopped

  photon:
    image: rtuszik/photon-docker:2.2.0
    container_name: apo-photon
    profiles: [geocoding, all]
    environment:
      UPDATE_STRATEGY: PARALLEL
      # rtuszik/photon-docker reads REGION (NOT COUNTRY_CODE). Empty/unset → planet (~56 GB compressed).
      REGION: ${COUNTRY_CODE:-de}
    volumes:
      - ./data/photon:/photon/data
    restart: unless-stopped

  whosonfirst:
    image: pelias/whosonfirst:v8.4.0
    container_name: apo-whosonfirst
    profiles: [data-setup]
    user: "${UID:-1001}:${GID:-1001}"
    environment:
      WHOSONFIRST_COUNTRY_CODE: ${WHOSONFIRST_COUNTRY_CODE:-${COUNTRY_CODE:-de}}
    volumes:
      - ./data/whosonfirst:/mnt/pelias/whosonfirst
    command: ["bash", "/code/pelias/whosonfirst/bin/download"]

  placeholder:
    image: pelias/placeholder:v5.5.0
    container_name: apo-placeholder
    profiles: [geocoding, all]
    environment:
      PORT: 3000
      PLACEHOLDER_DATA: /data
      WOF_DIR: /wof/sqlite
    volumes:
      - ./data/placeholder:/data
      - ./data/whosonfirst:/wof:ro
    restart: unless-stopped

  libpostal:
    image: pelias/libpostal-service:nodejs-20
    container_name: apo-libpostal
    profiles: [geocoding, all]
    restart: unless-stopped

  valhalla:
    image: ghcr.io/gis-ops/docker-valhalla/valhalla:3.5.1
    container_name: apo-valhalla
    profiles: [routing, all]
    environment:
      # gisops/docker-valhalla auto-detects *.osm.pbf inside /custom_files
      # and builds tiles from them. We don't use tile_urls (not real URLs).
      serve_tiles: "True"
      build_admins: "True"
      build_elevation: ${BUILD_ELEVATION:-False}
      use_tiles_ignore_pbf: "False"
    volumes:
      - ./data/valhalla:/custom_files
      - ./data/srtm:/custom_files/elevation_data
      - ./data/osm:/osm:ro
    restart: unless-stopped

  overpass:
    image: wiktorn/overpass-api:v0.7.62.11
    container_name: apo-overpass
    profiles: [pois, all]
    environment:
      # OVERPASS_META=yes ~doubles the memory needed during ingest (stores
      # author/timestamp per element). Off by default; flip to "yes" if you
      # need historical/metadata queries and have ≥24 GB Docker VM RAM.
      OVERPASS_META: ${OVERPASS_META:-no}
      OVERPASS_MODE: init
      # wiktorn/overpass-api needs OSM-XML+bzip2; the sidecar produces this
      # from the active PBF on every apply (data/osm/current.osm.bz2).
      OVERPASS_PLANET_URL: file:///osm/current.osm.bz2
      OVERPASS_DIFF_URL: ${OVERPASS_DIFF_URL:-https://download.geofabrik.de/europe/germany-updates/}
      OVERPASS_RULES_LOAD: 10
      OVERPASS_COMPRESSION: lz4
    volumes:
      - ./data/overpass:/db
      - ./data/osm:/osm:ro
    restart: unless-stopped

  otp:
    image: opentripplanner/opentripplanner:2.10.0_2026-05-18T08-51
    container_name: apo-otp
    profiles: [transit, all]
    # `--build --save --serve <dir>` builds the graph from any *.osm.pbf +
    # *.gtfs.zip files in <dir>, saves graph.obj, then serves the API.
    # The sidecar's apply step stages those files into data/otp/.
    # The image's entrypoint already passes /var/opentripplanner/ as the
    # directory; we only supply flags. Passing the dir twice fails parsing.
    command: ["--build", "--save", "--serve"]
    environment:
      # Berlin region build needs ~4 GB heap; default OOMs.
      # Tune via OTP_JAVA_OPTS in .env. Berlin needs ≥4 GB heap; on Docker
      # Desktop you may also need to raise the VM RAM allocation (Settings →
      # Resources → Memory) to ≥12 GB before transit will build cleanly.
      JAVA_OPTS: ${OTP_JAVA_OPTS:--Xmx4g -XX:+UseG1GC -XX:MaxGCPauseMillis=500}
    volumes:
      - ./data/otp:/var/opentripplanner
      - ./data/osm:/osm:ro
    restart: unless-stopped
